# =============================================================
# Per-Model Tuning Knowledge (Demo)
# 用途: 供 Per-Model Critic LLM 参考的逐模型经验知识
#
# 这是一个示例文件。请根据实际实验结果填写。
# 每次 Playground 实验后应更新此文件。
# =============================================================

models:

  # 示例：RNN 模型
  example_rnn_model:
    architecture_family: rnn
    dataset_family: Alpha360
    regularization_direction: aggressive
    tuning_notes: |
      RNN 架构模型，典型 best_epoch: 3-8。
      需要极限减速策略：高 dropout + 低 lr + 大 batch_size。
    known_effective_params:
      - param: dropout
        direction: increase
        evidence: "RNN 系架构通常需要 dropout ≥ 0.3"
    known_ineffective_params: []
    preferred_param_ranges:
      dropout: [0.3, 0.5]
      lr: [0.0002, 0.001]

  # 示例：Transformer 模型
  example_transformer_model:
    architecture_family: transformer
    dataset_family: Alpha158
    regularization_direction: aggressive
    tuning_notes: |
      Transformer 在高维因子数据集上需要强正则化。
      dropout ≥ 0.3 通常是必要的。
    known_effective_params:
      - param: dropout
        direction: increase
        evidence: "dropout 增加使 IC 和 ICIR 显著改善"
    known_ineffective_params:
      - param: dropout
        direction: decrease
        evidence: "降低 dropout 会导致 Transformer 严重过拟合"
    preferred_param_ranges:
      dropout: [0.3, 0.6]
      lr: [0.00003, 0.0001]

  # 示例：Tree 模型
  example_tree_model:
    architecture_family: tree
    dataset_family: Alpha158
    regularization_direction: neutral
    tuning_notes: |
      Tree 模型不支持 dropout/n_epochs/early_stop 类参数。
      调参通过 depth/num_leaves/l2_leaf_reg/iterations。
    known_effective_params: []
    known_ineffective_params:
      - param: dropout
        direction: any
        evidence: "Tree 模型不支持 dropout"
      - param: n_epochs
        direction: any
        evidence: "Tree 模型不受 epoch 类参数影响"
    preferred_param_ranges:
      depth: [4, 10]
      num_leaves: [16, 128]

  # 示例：CNN-RNN 混合架构（需谨慎对待 dropout）
  example_cnn_rnn_model:
    architecture_family: cnn_rnn
    dataset_family: Alpha360
    regularization_direction: cautious
    tuning_notes: |
      CNN-RNN 混合架构对 dropout 增加可能敏感。
      best_epoch 在中段是正常收敛，不一定是过拟合信号。
      建议单变量实验确认 dropout 方向。
    known_effective_params:
      - param: lr
        direction: decrease
        evidence: "降低学习率有助于稳定训练轨迹"
    known_ineffective_params:
      - param: dropout
        direction: increase
        evidence: "增加 dropout 可能导致 IC 下降"
    preferred_param_ranges:
      dropout: [0.1, 0.3]
      lr: [0.0002, 0.001]
